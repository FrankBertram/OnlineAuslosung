<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skat Auslosung</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090b;
    --card: #18181b;
    --card-border: #27272a;
    --surface: #27272a;
    --surface-hover: #3f3f46;
    --text: #fafafa;
    --text-muted: #a1a1aa;
    --accent: #a78bfa;
    --accent-bright: #c4b5fd;
    --accent-glow: rgba(167, 139, 250, 0.25);
    --accent-glow-strong: rgba(167, 139, 250, 0.5);
    --danger: #f87171;
    --success: #34d399;
    --yellow: #facc15;
    --yellow-bright: #fde047;
    --yellow-glow: rgba(250, 204, 21, 0.15);
    --radius: 8px;
    --radius-lg: 14px;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: stretch;
    padding: 4px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(167, 139, 250, 0.08), transparent),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(139, 92, 246, 0.06), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 0.5rem 0.6rem 0.6rem;
    max-width: 820px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 80px -12px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
  }

  /* --- Top bar --- */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.3rem;
    flex-shrink: 0;
  }

  .clock {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 48px;
    text-align: left;
  }

  .top-title {
    font-size: 0.95rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .sound-toggle {
    width: 28px; height: 28px;
    background: var(--surface);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-muted);
    padding: 0;
    flex-shrink: 0;
  }

  /* --- Content area --- */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }

  /* --- Chips --- */
  .chips-row {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    justify-content: center;
    margin-bottom: 0.3rem;
  }

  .name-chip {
    position: relative;
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 4px 8px;
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: 0.72rem;
    font-weight: 600;
    user-select: none;
    color: var(--text-muted);
    line-height: 1.2;
  }

  .name-chip:hover { background: var(--surface-hover); }

  .name-chip.checked {
    background: rgba(167, 139, 250, 0.12);
    border-color: var(--accent);
    color: var(--accent-bright);
  }

  .name-chip.checked-yellow {
    background: var(--yellow-glow);
    border-color: var(--yellow);
    color: var(--yellow-bright);
  }

  .name-chip.checked-yellow .chip-dot {
    background: var(--yellow);
    box-shadow: 0 0 4px rgba(250, 204, 21, 0.4);
  }

  .name-chip.disabled { opacity: 0.4; pointer-events: none; }

  .name-chip input { position: absolute; opacity: 0; width: 0; height: 0; }

  .chip-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--surface-hover);
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .name-chip.checked .chip-dot {
    background: var(--accent);
    box-shadow: 0 0 4px var(--accent-glow);
  }

  .msg { font-size: 0.62rem; font-weight: 500; min-height: 0.7rem; margin-bottom: 0.15rem; }
  .msg.error { color: var(--danger); }
  .msg.info { color: var(--text-muted); }
  .msg strong { color: var(--accent-bright); }

  /* --- Phase label --- */
  .phase-label {
    display: inline-flex;
    padding: 2px 7px;
    background: rgba(167, 139, 250, 0.1);
    border: 1px solid rgba(167, 139, 250, 0.2);
    border-radius: 999px;
    font-size: 0.58rem;
    font-weight: 600;
    color: var(--accent-bright);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.3rem;
  }

  /* --- Wheels --- */
  .wheels-row {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 0.4rem;
    flex-wrap: nowrap;
    margin: 0.2rem auto;
  }

  .wheel-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .wheel-unit-label {
    font-size: 0.5rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .wheel-stage {
    position: relative;
    width: 110px;
    height: 110px;
  }

  .wheel-stage canvas {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 8px var(--accent-glow));
  }

  .wheel-pointer {
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 12px solid var(--accent);
    filter: drop-shadow(0 1px 2px var(--accent-glow-strong));
    z-index: 3;
  }

  .wheel-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 50%;
    z-index: 3;
    box-shadow: 0 0 5px var(--accent-glow);
  }

  .wheel-result {
    min-height: 1rem;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent-bright);
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .wheel-result.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* --- Sit-out info (when no wheel needed) --- */
  .sit-out-info {
    padding: 0.5rem;
    background: rgba(250, 204, 21, 0.08);
    border: 1px solid rgba(250, 204, 21, 0.2);
    border-radius: var(--radius);
    margin: 0.3rem 0;
    animation: winnerReveal 0.5s ease;
  }

  .sit-out-info .label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.2rem; }
  .sit-out-info .names { font-size: 0.9rem; font-weight: 800; color: var(--yellow-bright); }

  /* --- Summary --- */
  .summary {
    display: none;
    margin-top: 0.4rem;
    padding: 0.5rem;
    background: rgba(167, 139, 250, 0.06);
    border: 1px solid rgba(167, 139, 250, 0.15);
    border-radius: var(--radius);
    animation: winnerReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .summary h3 {
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.3rem;
  }

  .summary-items {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    justify-content: center;
  }

  .summary-item {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.25rem 0.6rem;
    background: var(--surface);
    border-radius: var(--radius);
    font-weight: 700;
    font-size: 0.75rem;
  }

  .summary-item .num {
    width: 16px; height: 16px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.5rem;
    font-weight: 800;
    color: #fff;
  }

  .summary-item.highlight {
    background: rgba(167, 139, 250, 0.15);
    border: 1px solid var(--accent);
    color: var(--accent-bright);
    font-size: 0.85rem;
  }

  /* --- Status bar (persistent) --- */
  .status-bar {
    display: none;
    padding: 0.3rem 0.5rem;
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 0.3rem;
    text-align: left;
    font-size: 0.6rem;
    line-height: 1.5;
  }

  .status-bar .status-line {
    display: flex;
    align-items: baseline;
    gap: 0.3rem;
  }

  .status-bar .status-label {
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  .status-bar .status-names {
    font-weight: 600;
    color: var(--accent-bright);
  }

  .status-bar .status-names.yellow {
    color: var(--yellow-bright);
  }

  @keyframes winnerReveal {
    0%   { transform: translateY(8px) scale(0.95); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* --- Confetti --- */
  .confetti-container {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 100; overflow: hidden;
  }

  .confetti {
    position: absolute;
    border-radius: 2px;
    top: -10px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* --- Buttons --- */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    justify-content: center;
    margin-top: 0.4rem;
  }

  button {
    padding: 0.4rem 1rem;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff;
    box-shadow: 0 2px 10px var(--accent-glow);
  }
  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 4px 20px var(--accent-glow-strong);
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--card-border);
  }

  /* --- Desktop --- */
  @media (min-width: 600px) {
    body { padding: 1rem; align-items: flex-start; }
    .container { padding: 1rem 1.25rem; }
    .top-title { font-size: 1.2rem; }
    .wheel-stage { width: 160px; height: 160px; }
    .wheels-row { gap: 1rem; }
    .phase-label { font-size: 0.65rem; }
    .name-chip { font-size: 0.78rem; padding: 5px 10px; }
  }

  @media (max-width: 374px) {
    .wheel-stage { width: 85px; height: 85px; }
    .wheels-row { gap: 0.25rem; }
    .name-chip { padding: 3px 6px; font-size: 0.62rem; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <div class="clock" id="clock"></div>
    <div class="top-title"><img src="Skat.png" alt="" style="height:1.3em;vertical-align:middle;border-radius:3px;"> Auslosung Tisch 1</div>
    <button class="sound-toggle" onclick="toggleSound()" title="Sound an/aus">
      <svg id="soundOn" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      <svg id="soundOff" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    </button>
  </div>

  <div class="content">

    <!-- Persistente Status-Anzeige -->
    <div class="status-bar" id="statusBar">
      <div class="status-line">
        <span class="status-label">Spieler:</span>
        <span class="status-names" id="statusPlayers"></span>
      </div>
      <div class="status-line" id="statusSitOutLine" style="display:none">
        <span class="status-label">Setzt aus:</span>
        <span class="status-names yellow" id="statusSitOut"></span>
      </div>
    </div>

    <!-- Step 1: Anwesenheit -->
    <div id="stepAttendance">
      <div class="phase-label">Wer ist anwesend?</div>
      <div class="chips-row" id="nameChips"></div>
      <div class="msg error" id="errorMsg"></div>
      <div class="msg info" id="infoMsg"></div>
      <div class="btn-row">
        <button class="btn-primary" id="btnConfirm" onclick="confirmAttendance()">Best&auml;tigen</button>
      </div>
    </div>

    <!-- Step 2: Wer kann aussetzen? -->
    <div id="stepPickCandidates" style="display:none">
      <div class="phase-label">Wer kann aussetzen? <span id="sitOutNeeded"></span></div>
      <div class="msg info">Gelb = kann aussetzen. Nicht markierte spielen auf jeden Fall.</div>
      <div class="chips-row" id="candidateChips"></div>
      <div class="msg error" id="candidateError"></div>
      <div class="btn-row">
        <button class="btn-primary" id="btnStartSitOut" onclick="confirmCandidates()">Auslosen</button>
      </div>
    </div>

    <!-- Step 3a: Sit-out fest (kein Rad) -->
    <div id="stepSitOutFixed" style="display:none">
      <div class="sit-out-info">
        <div class="label">Setzt aus</div>
        <div class="names" id="sitOutFixedNames"></div>
      </div>
    </div>

    <!-- Step 3b: Sit-out Rad -->
    <div id="stepSitOut" style="display:none">
      <div class="phase-label">Wer setzt aus? (<span id="sitOutCount"></span>)</div>
      <div class="wheels-row" id="sitOutWheels"></div>
    </div>

    <!-- Step 4: Tisch-Auslosung -->
    <div id="stepTable" style="display:none">
      <div class="phase-label">Tisch 1 &mdash; 3 aus <span id="tablePoolCount"></span></div>
      <div class="wheels-row" id="tableWheels"></div>
    </div>

    <!-- Zusammenfassung -->
    <div class="summary" id="summary">
      <h3>Teilnehmer Tisch 1</h3>
      <div class="summary-items" id="summaryItems"></div>
    </div>

    <div class="btn-row" id="btnFinal" style="display:none">
      <button class="btn-primary" onclick="resetAll()">Neue Auslosung</button>
    </div>

  </div>
</div>

<script>
  const NAMES = ['Alfred', 'Bernd', 'Dieter', 'Frank', 'Michael', 'Norbert B.', 'Norbert G.'];
  const SEGMENT_COLORS = ['#dc2626','#ea580c','#ca8a04','#16a34a','#0d9488','#2563eb','#7c3aed','#be185d'];

  let soundEnabled = true;
  let present = [], sitOuts = [], tableWinners = [], candidates = [], sitOutNeeded = 0;

  // --- Clock ---
  function updateClock() {
    const d = new Date();
    document.getElementById('clock').textContent =
      [d.getHours(), d.getMinutes(), d.getSeconds()].map(v => String(v).padStart(2,'0')).join(':');
  }
  setInterval(updateClock, 1000);
  updateClock();

  // --- Audio ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playTick() {
    if (!soundEnabled) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 800 + Math.random() * 600; o.type = 'triangle';
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
    o.start(); o.stop(audioCtx.currentTime + 0.04);
  }

  function playWinSound() {
    if (!soundEnabled) return;
    [523,659,784,1047].forEach((f,i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = f; o.type = 'sine';
      const t = audioCtx.currentTime + i * 0.12;
      g.gain.setValueAtTime(0.1, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.start(t); o.stop(t + 0.3);
    });
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('soundOn').style.display = soundEnabled ? 'block' : 'none';
    document.getElementById('soundOff').style.display = soundEnabled ? 'none' : 'block';
  }

  // --- Step 1: Attendance chips ---
  function buildChips() {
    const c = document.getElementById('nameChips');
    c.innerHTML = '';
    NAMES.forEach((name, i) => {
      const l = document.createElement('label');
      l.className = 'name-chip checked';
      l.innerHTML = `<input type="checkbox" checked value="${i}" onchange="onChipChange()"><span class="chip-dot"></span><span>${name}</span>`;
      c.appendChild(l);
    });
  }

  function onChipChange() {
    document.querySelectorAll('#nameChips label').forEach(l => {
      l.classList.toggle('checked', l.querySelector('input').checked);
    });
    updateAttendanceInfo();
  }

  function getSelected() {
    return [...document.querySelectorAll('#nameChips input:checked')].map(cb => NAMES[+cb.value]);
  }

  function updateAttendanceInfo() {
    const n = getSelected().length;
    const err = document.getElementById('errorMsg');
    const info = document.getElementById('infoMsg');
    const btn = document.getElementById('btnConfirm');

    if (n < 3) {
      err.textContent = 'Mindestens 3 Teilnehmer';
      info.textContent = '';
      btn.disabled = true;
      return;
    }
    err.textContent = '';
    btn.disabled = false;
    const s = n % 3;
    info.innerHTML = s === 0
      ? `<strong>${n} Spieler</strong> \u2014 niemand setzt aus`
      : `<strong>${n} Spieler</strong> \u2014 ${s === 1 ? '1 setzt aus' : '2 setzen aus'}`;
  }

  // --- Status bar ---
  function updateStatusBar() {
    const bar = document.getElementById('statusBar');
    bar.style.display = 'block';
    document.getElementById('statusPlayers').textContent = present.join(', ');

    const sitLine = document.getElementById('statusSitOutLine');
    if (sitOuts.length > 0) {
      sitLine.style.display = 'flex';
      document.getElementById('statusSitOut').textContent = sitOuts.join(', ');
    } else {
      sitLine.style.display = 'none';
    }
  }

  // --- Step 1 → confirm ---
  function confirmAttendance() {
    present = getSelected();
    if (present.length < 3) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    sitOutNeeded = present.length % 3;
    updateStatusBar();

    if (sitOutNeeded === 0) {
      sitOuts = [];
      document.getElementById('stepAttendance').style.display = 'none';
      afterSitOut();
    } else {
      document.getElementById('stepAttendance').style.display = 'none';
      document.getElementById('sitOutNeeded').textContent =
        `(${sitOutNeeded === 1 ? '1 muss raus' : '2 m\u00fcssen raus'})`;
      buildCandidateChips();
      document.getElementById('stepPickCandidates').style.display = 'block';
    }
  }

  // --- Step 2: Candidate chips (yellow) ---
  function buildCandidateChips() {
    const c = document.getElementById('candidateChips');
    c.innerHTML = '';
    present.forEach((name, i) => {
      const l = document.createElement('label');
      l.className = 'name-chip';
      l.innerHTML = `<input type="checkbox" value="${i}" onchange="onCandidateChange()"><span class="chip-dot"></span><span>${name}</span>`;
      c.appendChild(l);
    });
    validateCandidates();
  }

  function onCandidateChange() {
    document.querySelectorAll('#candidateChips label').forEach(l => {
      const cb = l.querySelector('input');
      l.classList.remove('checked', 'checked-yellow');
      if (cb.checked) l.classList.add('checked-yellow');
    });
    validateCandidates();
  }

  function getCandidates() {
    return [...document.querySelectorAll('#candidateChips input:checked')].map(cb => present[+cb.value]);
  }

  function validateCandidates() {
    const sel = getCandidates().length;
    const err = document.getElementById('candidateError');
    const btn = document.getElementById('btnStartSitOut');
    if (sel < sitOutNeeded) {
      err.textContent = `Mind. ${sitOutNeeded} markieren`;
      btn.disabled = true;
    } else {
      err.textContent = '';
      btn.disabled = false;
    }
  }

  function confirmCandidates() {
    candidates = getCandidates();
    if (candidates.length < sitOutNeeded) return;

    document.getElementById('stepPickCandidates').style.display = 'none';

    if (candidates.length === sitOutNeeded) {
      // Fixed – no wheel needed
      sitOuts = [...candidates];
      updateStatusBar();
      document.getElementById('sitOutFixedNames').textContent = sitOuts.join(', ');
      document.getElementById('stepSitOutFixed').style.display = 'block';
      setTimeout(afterSitOut, 1500);
    } else {
      document.getElementById('sitOutCount').textContent =
        sitOutNeeded === 1 ? '1 Spieler' : '2 Spieler';
      document.getElementById('stepSitOut').style.display = 'block';
      drawSitOut(sitOutNeeded);
    }
  }

  // --- Step 3: Spin sit-out ---
  function drawSitOut(count) {
    sitOuts = [];
    const row = document.getElementById('sitOutWheels');
    row.innerHTML = '';
    const cvs = [], res = [];

    for (let w = 0; w < count; w++) {
      const u = document.createElement('div');
      u.className = 'wheel-unit';
      u.innerHTML = `
        ${count > 1 ? '<div class="wheel-unit-label">Rad '+(w+1)+'</div>' : ''}
        <div class="wheel-stage">
          <div class="wheel-pointer"></div>
          <canvas width="400" height="400"></canvas>
          <div class="wheel-center"></div>
        </div>
        <div class="wheel-result"></div>`;
      row.appendChild(u);
      cvs.push(u.querySelector('canvas'));
      res.push(u.querySelector('.wheel-result'));
    }

    let pool = [...candidates];
    let chain = Promise.resolve();

    for (let w = 0; w < count; w++) {
      const i = w;
      chain = chain.then(() => {
        const p = [...pool];
        drawWheel(cvs[i], p, 0);
        return spinWheel(cvs[i], p, 300).then(winner => {
          sitOuts.push(winner);
          pool = pool.filter(n => n !== winner);
          res[i].textContent = winner;
          res[i].classList.add('visible');
          playWinSound();
        });
      });
    }

    chain.then(() => {
      updateStatusBar();
      setTimeout(afterSitOut, 1200);
    });
  }

  // --- After sit-out ---
  function afterSitOut() {
    const remaining = present.filter(n => !sitOuts.includes(n));

    if (remaining.length === 6) {
      document.getElementById('tablePoolCount').textContent = '6';
      document.getElementById('stepTable').style.display = 'block';
      drawTable(remaining);
    } else if (remaining.length === 3) {
      tableWinners = remaining;
      showSummary();
    } else {
      tableWinners = remaining.slice(0, 3);
      showSummary();
    }
  }

  // --- Table draw ---
  function drawTable(pool) {
    tableWinners = [];
    const row = document.getElementById('tableWheels');
    row.innerHTML = '';
    const cvs = [], res = [];

    for (let w = 0; w < 3; w++) {
      const u = document.createElement('div');
      u.className = 'wheel-unit';
      u.innerHTML = `
        <div class="wheel-unit-label">Platz ${w+1}</div>
        <div class="wheel-stage">
          <div class="wheel-pointer"></div>
          <canvas width="400" height="400"></canvas>
          <div class="wheel-center"></div>
        </div>
        <div class="wheel-result"></div>`;
      row.appendChild(u);
      cvs.push(u.querySelector('canvas'));
      res.push(u.querySelector('.wheel-result'));
    }

    let rem = [...pool];
    let chain = Promise.resolve();

    for (let w = 0; w < 3; w++) {
      const i = w;
      chain = chain.then(() => {
        const p = [...rem];
        drawWheel(cvs[i], p, 0);
        return spinWheel(cvs[i], p, 300).then(winner => {
          tableWinners.push(winner);
          rem = rem.filter(n => n !== winner);
          res[i].textContent = winner;
          res[i].classList.add('visible');
          playWinSound();
        });
      });
    }

    chain.then(() => setTimeout(showSummary, 500));
  }

  // --- Summary ---
  function showSummary() {
    spawnConfetti();
    const items = document.getElementById('summaryItems');
    items.innerHTML = '';
    tableWinners.forEach((name, i) => {
      const d = document.createElement('div');
      d.className = 'summary-item' + (i === 0 ? ' highlight' : '');
      d.innerHTML = `<span class="num">${i+1}</span> ${name}`;
      items.appendChild(d);
    });
    document.getElementById('summary').style.display = 'block';
    document.getElementById('btnFinal').style.display = 'flex';
  }

  // --- Reset ---
  function resetAll() {
    present = []; sitOuts = []; tableWinners = []; candidates = []; sitOutNeeded = 0;
    document.getElementById('statusBar').style.display = 'none';
    document.getElementById('stepAttendance').style.display = 'block';
    document.getElementById('stepPickCandidates').style.display = 'none';
    document.getElementById('stepSitOutFixed').style.display = 'none';
    document.getElementById('stepSitOut').style.display = 'none';
    document.getElementById('stepTable').style.display = 'none';
    document.getElementById('summary').style.display = 'none';
    document.getElementById('btnFinal').style.display = 'none';
    document.querySelectorAll('#nameChips input').forEach(cb => {
      cb.checked = true;
      cb.parentElement.classList.add('checked');
    });
    updateAttendanceInfo();
  }

  // --- Draw wheel ---
  function drawWheel(canvas, names, angle) {
    const ctx = canvas.getContext('2d'), W = canvas.width, C = W/2, R = C - 6;
    const n = names.length, arc = (2*Math.PI)/n;
    ctx.clearRect(0,0,W,W);
    ctx.save(); ctx.translate(C,C); ctx.rotate(angle);

    for (let i = 0; i < n; i++) {
      const s = i*arc, e = s+arc;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,s,e); ctx.closePath();
      ctx.fillStyle = SEGMENT_COLORS[i%SEGMENT_COLORS.length]; ctx.fill();
      ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.stroke();

      ctx.save(); ctx.rotate(s + arc/2);
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.min(26, Math.max(14, 140/n+6))}px Inter,system-ui,sans-serif`;
      ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 2;
      ctx.fillText(names[i], R-10, 0);
      ctx.shadowBlur = 0; ctx.restore();
    }

    ctx.beginPath(); ctx.arc(0,0,R,0,2*Math.PI);
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,10,0,2*Math.PI);
    ctx.fillStyle = '#18181b'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(167,139,250,0.5)'; ctx.stroke();
    ctx.restore();
  }

  // --- Spin ---
  function spinWheel(canvas, names, delay) {
    return new Promise(resolve => {
      const n = names.length, arc = (2*Math.PI)/n;
      const wIdx = Math.floor(Math.random()*n);
      const segMid = wIdx*arc + arc/2;
      const base = -Math.PI/2 - segMid;
      const spins = (5+Math.floor(Math.random()*4))*2*Math.PI;
      let target = spins + (base - (spins%(2*Math.PI)));
      if (target < 4*Math.PI) target += 2*Math.PI*Math.ceil((4*Math.PI-target)/(2*Math.PI));
      target += (Math.random()-0.5)*arc*0.55;

      const dur = 5500+Math.random()*2000;
      let t0 = null, lastSeg = -1;

      function anim(now) {
        if (!t0) t0 = now;
        const t = Math.min((now-t0)/dur, 1);
        const ease = 1-Math.pow(1-t,4);
        const ang = target*ease;
        drawWheel(canvas, names, ang);

        const pa = ((-Math.PI/2 - ang%(2*Math.PI))+4*Math.PI)%(2*Math.PI);
        const si = Math.floor(pa/arc)%n;
        if (si !== lastSeg) { lastSeg = si; if (t < 0.93) playTick(); }

        if (t < 1) requestAnimationFrame(anim);
        else resolve(names[wIdx]);
      }

      setTimeout(() => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        requestAnimationFrame(anim);
      }, delay);
    });
  }

  // --- Confetti ---
  function spawnConfetti() {
    const cols = ['#a78bfa','#c4b5fd','#e879f9','#f0abfc','#fbbf24','#34d399','#60a5fa'];
    const c = document.createElement('div'); c.className = 'confetti-container';
    document.body.appendChild(c);
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div'); p.className = 'confetti';
      p.style.left = Math.random()*100+'%';
      p.style.background = cols[Math.floor(Math.random()*cols.length)];
      p.style.animationDuration = (1.5+Math.random()*2)+'s';
      p.style.animationDelay = Math.random()*0.5+'s';
      const s = 4+Math.random()*6;
      p.style.width = s+'px'; p.style.height = s+'px';
      c.appendChild(p);
    }
    setTimeout(() => c.remove(), 4000);
  }

  // --- Init ---
  buildChips();
  updateAttendanceInfo();
</script>
