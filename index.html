<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Namen-Auslosung</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090b;
    --card: #18181b;
    --card-border: #27272a;
    --surface: #27272a;
    --surface-hover: #3f3f46;
    --text: #fafafa;
    --text-muted: #a1a1aa;
    --accent: #a78bfa;
    --accent-bright: #c4b5fd;
    --accent-glow: rgba(167, 139, 250, 0.25);
    --accent-glow-strong: rgba(167, 139, 250, 0.5);
    --danger: #f87171;
    --success: #34d399;
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 0.5rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(167, 139, 250, 0.08), transparent),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(139, 92, 246, 0.06), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 1rem 1rem 1.25rem;
    max-width: 820px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 80px -12px rgba(0,0,0,0.6);
  }

  /* --- Top bar: clock + title + sound --- */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }

  .clock {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.03em;
    min-width: 54px;
    text-align: left;
  }

  .top-title {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .top-title .icon {
    font-size: 1rem;
  }

  .sound-toggle {
    width: 30px; height: 30px;
    background: var(--surface);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
    color: var(--text-muted);
    padding: 0;
    flex-shrink: 0;
  }
  .sound-toggle:hover { background: var(--surface-hover); }

  /* --- Compact chip row --- */
  .chips-row {
    display: grid;
    grid-template-columns: repeat(4, auto);
    gap: 4px;
    justify-content: center;
    margin-bottom: 0.5rem;
  }

  .name-chip {
    position: relative;
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 3px 8px;
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: 0.7rem;
    font-weight: 600;
    user-select: none;
    color: var(--text-muted);
    line-height: 1.3;
  }

  .name-chip:hover { background: var(--surface-hover); }

  .name-chip.checked {
    background: rgba(167, 139, 250, 0.12);
    border-color: var(--accent);
    color: var(--accent-bright);
  }

  .name-chip.disabled { opacity: 0.4; pointer-events: none; }

  .name-chip input { position: absolute; opacity: 0; width: 0; height: 0; }

  .chip-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--surface-hover);
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .name-chip.checked .chip-dot {
    background: var(--accent);
    box-shadow: 0 0 4px var(--accent-glow);
  }

  .error-msg {
    color: var(--danger);
    font-size: 0.65rem;
    font-weight: 500;
    min-height: 0.8rem;
    margin-bottom: 0.2rem;
  }

  /* --- Phase label --- */
  .phase-label {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 2px 8px;
    background: rgba(167, 139, 250, 0.1);
    border: 1px solid rgba(167, 139, 250, 0.2);
    border-radius: 999px;
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--accent-bright);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
  }

  /* --- Round 1 layout: chips above, wheel below --- */
  .round1-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
  }

  /* --- Wheels --- */
  .wheels-row {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 0.5rem;
    flex-wrap: nowrap;
    margin: 0.3rem auto;
  }

  .wheel-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .wheel-unit-label {
    font-size: 0.55rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .wheel-stage {
    position: relative;
    width: 140px;
    height: 140px;
  }

  .wheel-stage canvas {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 10px var(--accent-glow));
  }

  .wheel-pointer {
    position: absolute;
    top: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 14px solid var(--accent);
    filter: drop-shadow(0 1px 3px var(--accent-glow-strong));
    z-index: 3;
  }

  .wheel-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 16px; height: 16px;
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 50%;
    z-index: 3;
    box-shadow: 0 0 6px var(--accent-glow);
  }

  .wheel-result {
    min-height: 1.1rem;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--accent-bright);
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .wheel-result.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* --- Summary --- */
  .summary {
    display: none;
    margin-top: 0.6rem;
    padding: 0.6rem;
    background: rgba(167, 139, 250, 0.06);
    border: 1px solid rgba(167, 139, 250, 0.15);
    border-radius: var(--radius);
    animation: winnerReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .summary h3 {
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }

  .summary-items {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    justify-content: center;
  }

  .summary-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.3rem 0.7rem;
    background: var(--surface);
    border-radius: var(--radius);
    font-weight: 700;
    font-size: 0.8rem;
  }

  .summary-item .num {
    width: 17px; height: 17px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    font-weight: 800;
    color: #fff;
  }

  .summary-item.highlight {
    background: rgba(167, 139, 250, 0.15);
    border: 1px solid var(--accent);
    color: var(--accent-bright);
    font-size: 0.9rem;
  }

  @keyframes winnerReveal {
    0%   { transform: translateY(12px) scale(0.95); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* --- Confetti --- */
  .confetti-container {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 100; overflow: hidden;
  }

  .confetti {
    position: absolute;
    border-radius: 2px;
    top: -10px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* --- Buttons --- */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    justify-content: center;
    margin-top: 0.6rem;
  }

  button {
    padding: 0.5rem 1.1rem;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: #fff;
    box-shadow: 0 3px 12px var(--accent-glow);
  }
  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 6px 24px var(--accent-glow-strong);
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--text-muted);
    border: 1px solid var(--card-border);
  }
  .btn-secondary:hover:not(:disabled) {
    background: var(--surface-hover);
    color: var(--text);
  }

  /* --- Desktop: larger wheels, side-by-side round1 --- */
  @media (min-width: 600px) {
    body { padding: 1rem; align-items: flex-start; }
    .container { padding: 1.5rem; }
    .top-title { font-size: 1.3rem; }
    .round1-content { flex-direction: row; gap: 1.5rem; align-items: center; }
    .chips-col { min-width: 120px; }
    .wheel-stage { width: 180px; height: 180px; }
    .wheels-row { gap: 1rem; }
    .phase-label { font-size: 0.7rem; padding: 3px 10px; }
  }

  /* --- iPhone SE / small --- */
  @media (max-width: 374px) {
    .wheel-stage { width: 90px; height: 90px; }
    .wheels-row { gap: 0.3rem; }
    .name-chip { padding: 2px 6px; font-size: 0.65rem; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Top bar -->
  <div class="top-bar">
    <div class="clock" id="clock"></div>
    <div class="top-title"><img src="Skat.png" alt="Skat" style="height:1.4em;vertical-align:middle;border-radius:4px;"> Auslosung Tisch 1</div>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()" title="Sound an/aus">
      <svg id="soundOn" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      <svg id="soundOff" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    </button>
  </div>

  <!-- Ziehung 1 -->
  <div id="round1Area">
    <div class="phase-label">Wer setzt aus?</div>
    <div class="round1-content">
      <div class="chips-col">
        <div class="chips-row" id="nameChips"></div>
        <div class="error-msg" id="errorMsg"></div>
        <button class="btn-primary" id="btnSpin1" onclick="spinRound1()" style="font-size:0.75rem;padding:0.4rem 1rem;">Drehen</button>
      </div>
      <div class="wheel-unit">
        <div class="wheel-stage" id="wheelStage1">
          <div class="wheel-pointer"></div>
          <canvas id="wheel1" width="400" height="400"></canvas>
          <div class="wheel-center"></div>
        </div>
        <div class="wheel-result" id="result1"></div>
      </div>
    </div>
    <div id="btnRound1Post" style="display:none"></div>
  </div>

  <!-- Ziehung 2 -->
  <div id="round2Area" style="display:none">
    <div class="phase-label">Ziehung 2 &mdash; 3 Gewinner (ohne <span id="excludedName"></span>)</div>
    <div class="wheels-row" id="wheelsRow2"></div>
  </div>

  <!-- Zusammenfassung -->
  <div class="summary" id="summary">
    <h3>Teilnehmer Tisch 1</h3>
    <div class="summary-items" id="summaryItems"></div>
  </div>

  <div class="btn-row" id="btnFinal" style="display:none">
    <button class="btn-primary" onclick="resetAll()">Neue Auslosung</button>
  </div>
</div>

<script>
  const NAMES = ['Alfred', 'Bernd', 'Dieter', 'Frank', 'Michael', 'Norbert B.', 'Norbert G.'];
  const SEGMENT_COLORS = ['#7c3aed','#2563eb','#0d9488','#16a34a','#ca8a04','#ea580c','#dc2626','#be185d'];
  const MIN_SELECTED = 1;

  let soundEnabled = true, round1Winner = null, round2Winners = [], spinning1 = false;

  // --- Clock ---
  function updateClock() {
    const d = new Date();
    document.getElementById('clock').textContent =
      [d.getHours(), d.getMinutes(), d.getSeconds()].map(v => String(v).padStart(2,'0')).join(':');
  }
  setInterval(updateClock, 1000);
  updateClock();

  // --- Audio ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playTick() {
    if (!soundEnabled) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 800 + Math.random() * 600; o.type = 'triangle';
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
    o.start(); o.stop(audioCtx.currentTime + 0.04);
  }

  function playWinSound() {
    if (!soundEnabled) return;
    [523,659,784,1047].forEach((f,i) => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = f; o.type = 'sine';
      const t = audioCtx.currentTime + i * 0.12;
      g.gain.setValueAtTime(0.1, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.start(t); o.stop(t + 0.3);
    });
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    document.getElementById('soundOn').style.display = soundEnabled ? 'block' : 'none';
    document.getElementById('soundOff').style.display = soundEnabled ? 'none' : 'block';
  }

  // --- Chips ---
  function buildChips() {
    const c = document.getElementById('nameChips');
    c.innerHTML = '';
    NAMES.forEach((name, i) => {
      const l = document.createElement('label');
      l.className = 'name-chip checked';
      l.innerHTML = `<input type="checkbox" checked value="${i}" onchange="onChipChange(this)"><span class="chip-dot"></span><span>${name}</span>`;
      c.appendChild(l);
    });
  }

  function onChipChange(cb) {
    cb.parentElement.classList.toggle('checked', cb.checked);
    validateSelection();
  }

  function getSelected() {
    return [...document.querySelectorAll('#nameChips input:checked')].map(cb => NAMES[+cb.value]);
  }

  function validateSelection() {
    const n = getSelected().length, msg = document.getElementById('errorMsg');
    if (n < MIN_SELECTED) {
      msg.textContent = 'Mind. 1 Teilnehmer ausw\u00e4hlen';
      document.getElementById('btnSpin1').disabled = true;
    } else {
      msg.textContent = '';
      document.getElementById('btnSpin1').disabled = false;
    }
  }

  function setChipsEnabled(on) {
    document.querySelectorAll('#nameChips label').forEach(l => l.classList.toggle('disabled', !on));
  }

  // --- Draw wheel ---
  function drawWheel(canvas, names, angle) {
    const ctx = canvas.getContext('2d'), W = canvas.width, C = W/2, R = C - 6;
    const n = names.length, arc = (2*Math.PI)/n;
    ctx.clearRect(0,0,W,W);
    ctx.save(); ctx.translate(C,C); ctx.rotate(angle);

    for (let i = 0; i < n; i++) {
      const s = i*arc, e = s+arc;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,s,e); ctx.closePath();
      ctx.fillStyle = SEGMENT_COLORS[i%SEGMENT_COLORS.length]; ctx.fill();
      ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.stroke();

      ctx.save(); ctx.rotate(s + arc/2);
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.min(26, Math.max(14, 140/n+6))}px Inter,system-ui,sans-serif`;
      ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 2;
      ctx.fillText(names[i], R-10, 0);
      ctx.shadowBlur = 0; ctx.restore();
    }

    ctx.beginPath(); ctx.arc(0,0,R,0,2*Math.PI);
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,12,0,2*Math.PI);
    ctx.fillStyle = '#18181b'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(167,139,250,0.5)'; ctx.stroke();
    ctx.restore();
  }

  // --- Spin → Promise<winner> ---
  function spinWheel(canvas, names, delay) {
    return new Promise(resolve => {
      const n = names.length, arc = (2*Math.PI)/n;
      const wIdx = Math.floor(Math.random()*n);
      const segMid = wIdx*arc + arc/2;
      const base = -Math.PI/2 - segMid;
      const spins = (5+Math.floor(Math.random()*4))*2*Math.PI;
      let target = spins + (base - (spins%(2*Math.PI)));
      if (target < 4*Math.PI) target += 2*Math.PI*Math.ceil((4*Math.PI-target)/(2*Math.PI));
      target += (Math.random()-0.5)*arc*0.55;

      const dur = 5500+Math.random()*2000;
      let t0 = null, lastSeg = -1;

      function anim(now) {
        if (!t0) t0 = now;
        const t = Math.min((now-t0)/dur, 1);
        const ease = 1-Math.pow(1-t,4);
        const ang = target*ease;
        drawWheel(canvas, names, ang);

        const pa = ((-Math.PI/2 - ang%(2*Math.PI))+4*Math.PI)%(2*Math.PI);
        const si = Math.floor(pa/arc)%n;
        if (si !== lastSeg) { lastSeg = si; if (t < 0.93) playTick(); }

        if (t < 1) requestAnimationFrame(anim);
        else resolve(names[wIdx]);
      }

      setTimeout(() => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        requestAnimationFrame(anim);
      }, delay);
    });
  }

  // --- Round 1 ---
  function spinRound1() {
    const sel = getSelected();
    if (sel.length < MIN_SELECTED || spinning1) return;
    spinning1 = true;
    setChipsEnabled(false);
    document.getElementById('btnSpin1').disabled = true;
    document.getElementById('btnRound1Post').style.display = 'none';
    document.getElementById('result1').classList.remove('visible');
    document.getElementById('result1').textContent = '';

    const cv = document.getElementById('wheel1');
    drawWheel(cv, sel, 0);
    spinWheel(cv, sel, 100).then(w => {
      round1Winner = w;
      const el = document.getElementById('result1');
      el.textContent = w; el.classList.add('visible');
      playWinSound();
      spinning1 = false;
      setTimeout(startRound2, 1200);
    });
  }

  // --- Round 2 ---
  function startRound2() {
    document.getElementById('round2Area').style.display = 'block';
    document.getElementById('excludedName').textContent = round1Winner;

    const pool = NAMES.filter(n => n !== round1Winner);
    round2Winners = [];

    const row = document.getElementById('wheelsRow2');
    row.innerHTML = '';
    const cvs = [], res = [];

    for (let w = 0; w < 3; w++) {
      const u = document.createElement('div');
      u.className = 'wheel-unit';
      u.innerHTML = `
        <div class="wheel-unit-label">Rad ${w+1}</div>
        <div class="wheel-stage">
          <div class="wheel-pointer"></div>
          <canvas width="400" height="400"></canvas>
          <div class="wheel-center"></div>
        </div>
        <div class="wheel-result"></div>`;
      row.appendChild(u);
      cvs.push(u.querySelector('canvas'));
      res.push(u.querySelector('.wheel-result'));
    }

    let rem = [...pool], chain = Promise.resolve();
    for (let w = 0; w < 3; w++) {
      const i = w;
      chain = chain.then(() => {
        const p = [...rem];
        drawWheel(cvs[i], p, 0);
        return spinWheel(cvs[i], p, 200).then(winner => {
          round2Winners.push(winner);
          rem = rem.filter(n => n !== winner);
          res[i].textContent = winner; res[i].classList.add('visible');
          playWinSound();
        });
      });
    }
    chain.then(() => setTimeout(showSummary, 500));
  }

  // --- Summary ---
  function showSummary() {
    spawnConfetti();
    const items = document.getElementById('summaryItems');
    items.innerHTML = '';
    round2Winners.forEach((name, i) => {
      const d = document.createElement('div');
      d.className = 'summary-item' + (i === 0 ? ' highlight' : '');
      d.innerHTML = `<span class="num">${i+1}</span> ${name}`;
      items.appendChild(d);
    });
    document.getElementById('summary').style.display = 'block';
    document.getElementById('btnFinal').style.display = 'flex';
  }

  // --- Reset ---
  function resetAll() {
    round1Winner = null; round2Winners = []; spinning1 = false;
    document.getElementById('round1Area').style.display = 'block';
    document.getElementById('round2Area').style.display = 'none';
    document.getElementById('summary').style.display = 'none';
    document.getElementById('btnFinal').style.display = 'none';
    document.getElementById('result1').classList.remove('visible');
    document.getElementById('result1').textContent = '';
    setChipsEnabled(true);
    document.querySelectorAll('#nameChips input').forEach(cb => {
      cb.checked = true; cb.parentElement.classList.add('checked');
    });
    validateSelection();
    drawWheel(document.getElementById('wheel1'), NAMES, 0);
  }

  // --- Confetti ---
  function spawnConfetti() {
    const cols = ['#a78bfa','#c4b5fd','#e879f9','#f0abfc','#fbbf24','#34d399','#60a5fa'];
    const c = document.createElement('div'); c.className = 'confetti-container';
    document.body.appendChild(c);
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div'); p.className = 'confetti';
      p.style.left = Math.random()*100+'%';
      p.style.background = cols[Math.floor(Math.random()*cols.length)];
      p.style.animationDuration = (1.5+Math.random()*2)+'s';
      p.style.animationDelay = Math.random()*0.5+'s';
      const s = 4+Math.random()*6;
      p.style.width = s+'px'; p.style.height = s+'px';
      c.appendChild(p);
    }
    setTimeout(() => c.remove(), 4000);
  }

  function shuffle(a) {
    for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  // --- Init ---
  buildChips();
  validateSelection();
  drawWheel(document.getElementById('wheel1'), NAMES, 0);
</script>

</body>
</html>
